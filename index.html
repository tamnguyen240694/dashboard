<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brand Manager Dashboard</title>
<style>
:root{
  --bg:#f0f7f9;--surface:#e8f4f7;--card:#ffffff;
  --deep:#1a5f7a;--mid:#2e8fa8;--light:#7ec8d8;--mist:#b8dde6;--foam:#dff0f4;
  --text:#1e3d4a;--muted:#5a8a96;--soft:#8ab5bf;
  --border:rgba(46,143,168,0.15);--border-mid:rgba(46,143,168,0.28);
  --r:10px;--rl:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1.5rem}
.dash{max-width:940px;margin:0 auto}
.greeting{font-size:12px;color:var(--soft);margin-bottom:4px}
.page-title{font-size:24px;font-weight:500;color:var(--deep);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:2rem}
.divider{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);border-bottom:1px solid var(--border);padding-bottom:7px;margin:2rem 0 1rem}
.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;margin-bottom:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem 1.3rem;margin-bottom:12px}
.sec-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--soft);margin-bottom:14px}

.task-row{padding:9px 0;border-bottom:1px solid var(--border)}
.task-row:last-child{border-bottom:none}
.task-row:hover .del-btn{opacity:1}
.task-top{display:flex;align-items:center;gap:9px}
.task-desc-wrap{margin:5px 0 2px 25px}
.task-desc{font-size:12px;color:var(--muted);line-height:1.55;width:100%;border:none;background:transparent;outline:none;resize:none;font-family:inherit;min-height:18px;overflow:hidden}
.task-desc:focus{background:var(--surface);border-radius:4px;padding:3px 5px}
.task-desc::placeholder{color:var(--soft);font-style:italic}
.task-links{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
.task-link{font-size:11px;color:var(--mid);text-decoration:none;border:1px solid var(--border-mid);border-radius:5px;padding:2px 8px;background:var(--foam)}
.task-link:hover{background:var(--mist);text-decoration:none}
.link-del{background:none;border:none;cursor:pointer;color:var(--soft);font-size:11px;padding:0;line-height:1;margin-left:-2px}
.link-del:hover{color:#c05050}
.add-link-btn{font-size:11px;color:var(--soft);background:none;border:1px dashed var(--border-mid);border-radius:5px;padding:2px 8px;cursor:pointer;display:none}
.task-row:hover .add-link-btn,.task-row:focus-within .add-link-btn{display:inline-block}
.add-link-btn:hover{color:var(--mid);border-color:var(--mid)}

.cb{width:16px;height:16px;border-radius:5px;border:1px solid var(--mist);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb.done{background:var(--light);border-color:var(--light)}
.cb.done::after{content:'';display:block;width:5px;height:8px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.task-text{font-size:13px;color:var(--text);flex:1;border:none;background:transparent;outline:none;padding:2px 4px;border-radius:4px;line-height:1.4;font-family:inherit}
.task-text.done{color:var(--soft);text-decoration:line-through}
.task-text:focus{background:var(--surface)}

.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.tag-urgent{background:#fce8e8;color:#8b3a3a}
.tag-meeting{background:var(--foam);color:var(--deep)}
.tag-ops{background:var(--surface);color:var(--muted)}
.tag-project{background:#edf5e8;color:#3a6a2a}
.tag-other{background:var(--surface);color:var(--muted)}
.tag-active{background:#edf5e8;color:#2e6020}
.tag-building{background:#fef5e0;color:#7a5a10}
.tag-stable{background:var(--foam);color:var(--deep)}
.tag-planning{background:var(--surface);color:var(--muted)}
.tag-wait{background:var(--surface);color:var(--soft)}
.tag-doing{background:#fef5e0;color:#7a5a10}
select.tag{border:none;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}

.del-btn{background:none;border:none;cursor:pointer;color:var(--soft);font-size:13px;line-height:1;padding:0 2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.del-btn:hover{color:#c05050}

.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:7px 11px;font-size:12px;color:var(--text);outline:none;font-family:inherit}
.add-row input:focus{border-color:var(--light)}
.add-row input::placeholder{color:var(--soft)}
.add-btn{background:var(--foam);border:1px solid var(--mist);border-radius:var(--r);padding:7px 13px;font-size:12px;color:var(--deep);cursor:pointer;white-space:nowrap}
.add-btn:hover{background:var(--mist)}

.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.av-1{background:var(--foam);color:var(--deep)}.av-2{background:#e8f0e8;color:#2e5a2e}
.av-3{background:#f0ece8;color:#6a4a2e}.av-4{background:#ece8f5;color:#4a3a7a}.av-5{background:#f5ece8;color:#7a3a2e}

.row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row:hover .del-btn{opacity:1}
.editable{border:none;background:transparent;outline:none;font-size:13px;color:var(--text);flex:1;min-width:0;padding:2px 4px;border-radius:4px;font-family:inherit}
.editable:focus{background:var(--surface)}
.editable-sub{border:none;background:transparent;outline:none;font-size:11px;color:var(--soft);width:100%;padding:1px 4px;border-radius:3px;font-family:inherit;margin-top:1px}
.editable-sub:focus{background:var(--surface)}
.txt-wrap{flex:1;min-width:0;display:flex;flex-direction:column}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bar-input{width:52px;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer;border:none;padding:0;flex-shrink:0}

/* KPI fully editable */
.metric-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
.metric{background:var(--surface);border-radius:var(--r);padding:12px 14px;position:relative}
.metric:hover .del-btn{opacity:1}
.metric .del-btn{position:absolute;top:7px;right:7px}
.m-label{font-size:11px;color:var(--soft);background:transparent;border:none;outline:none;width:calc(100% - 18px);font-family:inherit;margin-bottom:6px;border-bottom:1px dashed transparent;transition:border .15s;display:block}
.m-label:hover,.m-label:focus{border-bottom-color:var(--border-mid)}
.m-val{font-size:22px;font-weight:500;color:var(--deep);background:transparent;border:none;border-bottom:1px solid var(--border-mid);width:100%;outline:none;padding:0;font-family:inherit;line-height:1.25;margin-bottom:5px;display:block}
.m-val:focus{border-bottom-color:var(--mid)}
.m-unit{font-size:11px;color:var(--soft);background:transparent;border:none;outline:none;width:100%;font-family:inherit;border-bottom:1px dashed transparent;transition:border .15s;display:block}
.m-unit:hover,.m-unit:focus{border-bottom-color:var(--border-mid)}
.add-kpi-btn{background:var(--surface);border:1px dashed var(--border-mid);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--soft);cursor:pointer;text-align:center;width:100%;transition:all .15s;font-family:inherit}
.add-kpi-btn:hover{color:var(--mid);border-color:var(--mid)}

.kpi-pills{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:2px}
.kpi-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border-mid);color:var(--muted);background:var(--foam);cursor:pointer;outline:none;font-family:inherit}
.kpi-pill:focus{border-color:var(--light);background:#fff}

.comm-icon{width:24px;height:24px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,50,60,0.25);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--rl);padding:1.5rem;width:360px;border:1px solid var(--border-mid)}
.modal h3{font-size:15px;font-weight:500;color:var(--deep);margin-bottom:1rem}
.modal label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;margin-top:10px}
.modal input{width:100%;background:var(--surface);border:1px solid var(--border-mid);border-radius:var(--r);padding:8px 10px;font-size:13px;color:var(--text);outline:none;font-family:inherit}
.modal input:focus{border-color:var(--light)}
.modal-note{font-size:11px;color:var(--soft);margin-top:6px;line-height:1.5}
.modal-actions{display:flex;gap:8px;margin-top:1.2rem;justify-content:flex-end}
.btn-cancel{background:var(--surface);border:1px solid var(--border-mid);border-radius:var(--r);padding:7px 16px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit}
.btn-save{background:var(--mid);border:none;border-radius:var(--r);padding:7px 18px;font-size:12px;color:#fff;cursor:pointer;font-family:inherit}
.btn-save:hover{background:var(--deep)}
</style>
</head>
<body>
<div class="dash">

<div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:2rem">
  <p style="font-size:28px;font-weight:500;color:var(--deep);letter-spacing:-.01em">Tamy Dashboard</p>
  <p id="dateStr" style="font-size:13px;color:var(--soft);white-space:nowrap"></p>
</div>

<div class="divider">Hàng ngày</div>

<div class="grid2">
<div class="card">
  <p class="sec-label">Công việc hôm nay</p>
  <div id="taskList"></div>
  <div class="add-row">
    <input id="taskInput" placeholder="Thêm việc mới..."/>
    <select id="taskTag" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:7px 8px;font-size:12px;color:var(--muted);outline:none;cursor:pointer;font-family:inherit">
      <option value="other">Khác</option>
      <option value="urgent">Gấp</option>
      <option value="meeting">Họp</option>
      <option value="ops">Vận hành</option>
      <option value="project">Dự án</option>
    </select>
    <button class="add-btn" onclick="addTask()">+ Thêm</button>
  </div>
</div>

<div class="card">
  <p class="sec-label">Khách hàng đang follow</p>
  <div id="clientList"></div>
  <div class="add-row">
    <input id="clientInput" placeholder="Tên khách hàng..."/>
    <button class="add-btn" onclick="openAddClient()">+ Thêm</button>
  </div>
</div>
</div>

<div class="divider">Chiến lược thương hiệu</div>

<div class="card">
  <p class="sec-label">Mục tiêu & KPI</p>
  <div class="metric-grid" id="kpiGrid"></div>
  <div class="kpi-pills" id="kpiPills"></div>
</div>

<div class="grid2">
<div class="card">
  <p class="sec-label">Kênh marketing</p>
  <div id="channelList"></div>
  <div class="add-row">
    <input id="channelInput" placeholder="Tên kênh mới..."/>
    <button class="add-btn" onclick="addChannel()">+ Thêm</button>
  </div>
</div>
<div class="card">
  <p class="sec-label">Chiến dịch đang chạy</p>
  <div id="campaignList"></div>
  <div class="add-row">
    <input id="campaignInput" placeholder="Tên chiến dịch..."/>
    <button class="add-btn" onclick="addCampaign()">+ Thêm</button>
  </div>
</div>
</div>

<div class="divider">Xây dựng cộng đồng</div>

<div class="card">
  <p class="sec-label">Kế hoạch & hoạt động</p>
  <div id="commList"></div>
  <div class="add-row">
    <input id="commInput" placeholder="Hoạt động mới..."/>
    <button class="add-btn" onclick="addComm()">+ Thêm</button>
  </div>
</div>

</div>

<!-- Modal: thêm khách hàng -->
<div class="modal-bg" id="clientModal">
  <div class="modal">
    <h3>Thêm khách hàng</h3>
    <label>Tên công ty</label><input id="m-name" placeholder="VD: Vingroup"/>
    <label>Dịch vụ / ghi chú</label><input id="m-sub" placeholder="VD: Workshop lãnh đạo · 120 pax"/>
    <label>Trạng thái</label><input id="m-action" placeholder="VD: Chờ phản hồi"/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('clientModal')">Huỷ</button>
      <button class="btn-save" onclick="saveClient()">Lưu</button>
    </div>
  </div>
</div>

<!-- Modal: thêm link vào task -->
<div class="modal-bg" id="linkModal">
  <div class="modal">
    <h3>Thêm link vào task</h3>
    <label>Tên hiển thị</label>
    <input id="l-label" placeholder="VD: Xem proposal, File drive..."/>
    <label>Đường link</label>
    <input id="l-url" placeholder="https://..."/>
    <p class="modal-note">Link sẽ hiện ngay dưới mô tả task. Click để mở trong tab mới.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('linkModal')">Huỷ</button>
      <button class="btn-save" onclick="saveLink()">Thêm</button>
    </div>
  </div>
</div>

<script>
function updateClock(){const now=new Date();const date=now.toLocaleDateString('vi-VN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});const time=now.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('dateStr').textContent=date+' · '+time;}updateClock();setInterval(updateClock,1000);

const S=(k,v)=>{if(v!==undefined)localStorage.setItem(k,JSON.stringify(v));else{try{return JSON.parse(localStorage.getItem(k))}catch{return null}}};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const tagMap={urgent:'tag-urgent',meeting:'tag-meeting',ops:'tag-ops',project:'tag-project',other:'tag-other'};
const tagLabel={urgent:'Gấp',meeting:'Họp',ops:'Vận hành',project:'Dự án',other:'Khác'};
const avCls=['av-1','av-2','av-3','av-4','av-5'];
const camS=['Đang làm','Đang chạy','Lên kế hoạch','Chờ lịch','Hoàn thành'];
const camT={'Đang làm':'tag-doing','Đang chạy':'tag-active','Lên kế hoạch':'tag-planning','Chờ lịch':'tag-wait','Hoàn thành':'tag-stable'};
const chS=['Chủ lực','Đang xây','Ổn định','Thử nghiệm'];
const chT={'Chủ lực':'tag-active','Đang xây':'tag-building','Ổn định':'tag-stable','Thử nghiệm':'tag-planning'};
const coS=['Đang chạy','Lên kế hoạch','Ổn định','Chờ','Hoàn thành'];
const coT={'Đang chạy':'tag-active','Lên kế hoạch':'tag-building','Ổn định':'tag-stable','Chờ':'tag-wait','Hoàn thành':'tag-ops'};

let tasks=S('t5')||[
  {text:'Gửi proposal cho Vingroup',done:false,tag:'urgent',desc:'Cập nhật slide trang 4–7 theo brief mới. Deadline 5pm.',links:[{label:'Proposal draft',url:'https://docs.google.com'}]},
  {text:'Họp team review Q2 plan',done:false,tag:'meeting',desc:'10h, phòng B3. Chuẩn bị số liệu Q1.',links:[]},
  {text:'Check nhà cung cấp AV',done:true,tag:'ops',desc:'',links:[]},
  {text:'Update slide deck sự kiện 5/5',done:false,tag:'project',desc:'Deadline EOD. File gốc trên Drive.',links:[{label:'File slide',url:'https://drive.google.com'}]},
];
let clients=S('c5')||[
  {name:'Vingroup',sub:'Workshop lãnh đạo · 120 pax',action:'Chờ phản hồi',av:'av-1'},
  {name:'FPT Software',sub:'Team building Q2',action:'Demo 15/4',av:'av-2'},
  {name:'Masan Group',sub:'Annual conference',action:'Negotiating',av:'av-3'},
  {name:'Techcombank',sub:'Leadership offsite',action:'Signed',av:'av-4'},
];
let kpis=S('kpi5')||[
  {label:'Doanh số mục tiêu',val:'500M',unit:'VNĐ / tháng'},
  {label:'Leads mới',val:'20',unit:'khách hàng / tháng'},
  {label:'Brand awareness',val:'65%',unit:'target Q2'},
];
let kpiPills=S('kp5')||['Conversion 15%','NPS ≥ 8','Repeat client 40%','Avg deal 80M'];
let channels=S('ch5')||[
  {name:'LinkedIn',sub:'Content + outreach B2B',pct:80,status:'Chủ lực',color:'#2e8fa8'},
  {name:'Website / SEO',sub:'Inbound & portfolio',pct:45,status:'Đang xây',color:'#5aaa6a'},
  {name:'Email marketing',sub:'Nurture & newsletter',pct:60,status:'Ổn định',color:'#7ec8d8'},
  {name:'Referral / WOM',sub:'Từ khách hàng cũ',pct:70,status:'Chủ lực',color:'#b8a87a'},
];
let campaigns=S('cp5')||[
  {name:'Brand positioning deck',sub:'Messaging & visual identity',status:'Đang làm',color:'#2e8fa8'},
  {name:'Case study series',sub:'3 dự án → LinkedIn + web',status:'Đang làm',color:'#5aaa6a'},
  {name:'Q2 outreach campaign',sub:'BFSI + Tech · 50 leads',status:'Lên kế hoạch',color:'#7ec8d8'},
  {name:'Thought leadership',sub:'4 bài/tháng · LinkedIn',status:'Đang chạy',color:'#b8a87a'},
  {name:'Testimonial video',sub:'Quay 2 khách hàng lớn',status:'Chờ lịch',color:'#c8c0b8'},
];
let comms=S('co5')||[
  {name:'LinkedIn content series: "Event Insights"',sub:'Hàng tuần · Thứ 3',status:'Đang chạy'},
  {name:'Host breakfast talk cho brand manager',sub:'Tháng 5 · 2025',status:'Lên kế hoạch'},
  {name:'Newsletter cho khách hàng cũ',sub:'Hàng tháng',status:'Ổn định'},
  {name:'Referral program cho đối tác',sub:'Đang thiết kế',status:'Chờ'},
];

function saveAll(){S('t5',tasks);S('c5',clients);S('kpi5',kpis);S('kp5',kpiPills);S('ch5',channels);S('cp5',campaigns);S('co5',comms);}

/* TASKS */
let pendingLinkIdx=null;
function renderTasks(){
  document.getElementById('taskList').innerHTML=tasks.map((t,i)=>{
    const linksHtml=(t.links||[]).map((l,li)=>
      `<a class="task-link" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a><button class="link-del" onclick="delLink(${i},${li})" title="Xoá link">✕</button>`
    ).join('');
    return `<div class="task-row" id="tr${i}">
      <div class="task-top">
        <div class="cb ${t.done?'done':''}" onclick="toggleTask(${i})"></div>
        <input class="task-text ${t.done?'done':''}" value="${esc(t.text)}" onchange="tasks[${i}].text=this.value;saveAll()"/>
        <select class="tag ${tagMap[t.tag]||'tag-other'}" onchange="tasks[${i}].tag=this.value;saveAll();renderTasks()" style="border:none;outline:none;cursor:pointer;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;font-family:inherit">
          ${Object.keys(tagLabel).map(k=>`<option value="${k}"${t.tag===k?' selected':''}>${tagLabel[k]}</option>`).join('')}
        </select>
        <button class="del-btn" onclick="tasks.splice(${i},1);saveAll();renderTasks()" title="Xoá">✕</button>
      </div>
      <div class="task-desc-wrap">
        <textarea class="task-desc" rows="1" placeholder="Mô tả thêm..." onchange="tasks[${i}].desc=this.value;saveAll()" oninput="rsz(this)">${esc(t.desc||'')}</textarea>
        <div class="task-links">${linksHtml}<button class="add-link-btn" onclick="openLinkModal(${i})">+ Link</button></div>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.task-desc').forEach(rsz);
}
function rsz(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function toggleTask(i){tasks[i].done=!tasks[i].done;saveAll();renderTasks();}
function addTask(){
  const inp=document.getElementById('taskInput'),tag=document.getElementById('taskTag').value,v=inp.value.trim();
  if(!v)return;
  tasks.unshift({text:v,done:false,tag,desc:'',links:[]});saveAll();inp.value='';renderTasks();
}
document.getElementById('taskInput').onkeydown=e=>{if(e.key==='Enter')addTask();};
function openLinkModal(i){pendingLinkIdx=i;document.getElementById('l-label').value='';document.getElementById('l-url').value='';document.getElementById('linkModal').classList.add('open');setTimeout(()=>document.getElementById('l-label').focus(),50);}
function saveLink(){
  const label=document.getElementById('l-label').value.trim(),url=document.getElementById('l-url').value.trim();
  if(!url)return;
  if(!tasks[pendingLinkIdx].links)tasks[pendingLinkIdx].links=[];
  tasks[pendingLinkIdx].links.push({label:label||url,url});saveAll();renderTasks();closeModal('linkModal');
}
function delLink(ti,li){tasks[ti].links.splice(li,1);saveAll();renderTasks();}
document.getElementById('l-url').onkeydown=e=>{if(e.key==='Enter')saveLink();};

/* CLIENTS */
function renderClients(){
  document.getElementById('clientList').innerHTML=clients.map((c,i)=>`
    <div class="row">
      <div class="avatar ${c.av}">${c.name.substring(0,2).toUpperCase()}</div>
      <div class="txt-wrap">
        <input class="editable" value="${esc(c.name)}" onchange="clients[${i}].name=this.value;saveAll();renderClients()"/>
        <input class="editable-sub" value="${esc(c.sub)}" onchange="clients[${i}].sub=this.value;saveAll()"/>
      </div>
      <input class="tag tag-ops" value="${esc(c.action)}" onchange="clients[${i}].action=this.value;saveAll()" style="width:90px;text-align:center;border:none;outline:none;font-family:inherit;cursor:text"/>
      <button class="del-btn" onclick="clients.splice(${i},1);saveAll();renderClients()">✕</button>
    </div>`).join('');
}
function openAddClient(){
  document.getElementById('m-name').value=document.getElementById('clientInput').value;
  document.getElementById('m-sub').value='';document.getElementById('m-action').value='';
  document.getElementById('clientModal').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),50);
}
function saveClient(){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  clients.unshift({name,sub:document.getElementById('m-sub').value,action:document.getElementById('m-action').value||'Follow up',av:avCls[clients.length%5]});
  saveAll();document.getElementById('clientInput').value='';renderClients();closeModal('clientModal');
}
document.getElementById('m-action').onkeydown=e=>{if(e.key==='Enter')saveClient();};

/* KPI */
function renderKPI(){
  const cols=kpis.map((k,i)=>`
    <div class="metric">
      <button class="del-btn" onclick="kpis.splice(${i},1);saveAll();renderKPI()">✕</button>
      <input class="m-label" value="${esc(k.label)}" placeholder="Tên chỉ số" onchange="kpis[${i}].label=this.value;saveAll()"/>
      <input class="m-val" value="${esc(k.val)}" placeholder="0" onchange="kpis[${i}].val=this.value;saveAll()"/>
      <input class="m-unit" value="${esc(k.unit)}" placeholder="đơn vị" onchange="kpis[${i}].unit=this.value;saveAll()"/>
    </div>`).join('');
  const add=kpis.length<6?`<button class="add-kpi-btn" onclick="kpis.push({label:'Chỉ số mới',val:'—',unit:'đơn vị'});saveAll();renderKPI()">+ Thêm KPI</button>`:'';
  document.getElementById('kpiGrid').innerHTML=cols+add;
}
function renderKPIPills(){
  document.getElementById('kpiPills').innerHTML=kpiPills.map((p,i)=>
    `<input class="kpi-pill" value="${esc(p)}" style="width:${Math.max(70,p.length*7.5)}px" onchange="kpiPills[${i}]=this.value;saveAll()" onkeydown="if(event.key==='Enter')this.blur()" title="Chuột phải để xoá" oncontextmenu="event.preventDefault();kpiPills.splice(${i},1);saveAll();renderKPIPills()"/>`
  ).join('')+`<button class="add-btn" style="font-size:11px;padding:3px 10px" onclick="kpiPills.push('KPI phụ');saveAll();renderKPIPills()">+</button>`;
}

/* CHANNELS */
function renderChannels(){
  document.getElementById('channelList').innerHTML=channels.map((c,i)=>`
    <div class="row">
      <div class="dot" style="background:${c.color}"></div>
      <div class="txt-wrap">
        <input class="editable" value="${esc(c.name)}" onchange="channels[${i}].name=this.value;saveAll()"/>
        <input class="editable-sub" value="${esc(c.sub)}" onchange="channels[${i}].sub=this.value;saveAll()"/>
      </div>
      <input type="range" class="bar-input" min="0" max="100" step="1" value="${c.pct}" style="accent-color:${c.color}" oninput="channels[${i}].pct=+this.value;saveAll()"/>
      <select class="tag ${chT[c.status]||'tag-ops'}" onchange="channels[${i}].status=this.value;saveAll();renderChannels()" style="border:none;outline:none;cursor:pointer;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;font-family:inherit">
        ${chS.map(s=>`<option value="${s}"${c.status===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <button class="del-btn" onclick="channels.splice(${i},1);saveAll();renderChannels()">✕</button>
    </div>`).join('');
}
function addChannel(){
  const inp=document.getElementById('channelInput'),v=inp.value.trim();if(!v)return;
  const cols=['#2e8fa8','#5aaa6a','#7ec8d8','#b8a87a','#c8c0b8'];
  channels.push({name:v,sub:'',pct:50,status:'Thử nghiệm',color:cols[channels.length%cols.length]});
  saveAll();inp.value='';renderChannels();
}
document.getElementById('channelInput').onkeydown=e=>{if(e.key==='Enter')addChannel();};

/* CAMPAIGNS */
function renderCampaigns(){
  document.getElementById('campaignList').innerHTML=campaigns.map((c,i)=>`
    <div class="row">
      <div class="dot" style="background:${c.color}"></div>
      <div class="txt-wrap">
        <input class="editable" value="${esc(c.name)}" onchange="campaigns[${i}].name=this.value;saveAll()"/>
        <input class="editable-sub" value="${esc(c.sub)}" onchange="campaigns[${i}].sub=this.value;saveAll()"/>
      </div>
      <select class="tag ${camT[c.status]||'tag-ops'}" onchange="campaigns[${i}].status=this.value;saveAll();renderCampaigns()" style="border:none;outline:none;cursor:pointer;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;font-family:inherit">
        ${camS.map(s=>`<option value="${s}"${c.status===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <button class="del-btn" onclick="campaigns.splice(${i},1);saveAll();renderCampaigns()">✕</button>
    </div>`).join('');
}
function addCampaign(){
  const inp=document.getElementById('campaignInput'),v=inp.value.trim();if(!v)return;
  const cols=['#2e8fa8','#5aaa6a','#7ec8d8','#b8a87a','#c8c0b8'];
  campaigns.push({name:v,sub:'',status:'Lên kế hoạch',color:cols[campaigns.length%cols.length]});
  saveAll();inp.value='';renderCampaigns();
}
document.getElementById('campaignInput').onkeydown=e=>{if(e.key==='Enter')addCampaign();};

/* COMMUNITY */
const ci=[
  `<svg width="11" height="11" viewBox="0 0 16 16" stroke="#5a8a96" fill="none" stroke-width="1.5"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-3 2.2-5 5-5s5 2 5 5"/><circle cx="12" cy="5" r="2"/><path d="M12 10c1.7.2 3 1.5 3 3"/></svg>`,
  `<svg width="11" height="11" viewBox="0 0 16 16" stroke="#5a8a96" fill="none" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M1 4l7 5 7-5"/></svg>`,
  `<svg width="11" height="11" viewBox="0 0 16 16" stroke="#5a8a96" fill="none" stroke-width="1.5"><path d="M2 4h12v8a1 1 0 01-1 1H3a1 1 0 01-1-1V4z"/><path d="M2 4l6 5 6-5"/></svg>`,
  `<svg width="11" height="11" viewBox="0 0 16 16" stroke="#5a8a96" fill="none" stroke-width="1.5"><polygon points="8,1 10,6 15,6 11,9.5 12.5,15 8,11.5 3.5,15 5,9.5 1,6 6,6"/></svg>`,
];
function renderComm(){
  document.getElementById('commList').innerHTML=comms.map((c,i)=>`
    <div class="row">
      <div class="comm-icon">${ci[i%4]}</div>
      <div class="txt-wrap">
        <input class="editable" value="${esc(c.name)}" onchange="comms[${i}].name=this.value;saveAll()"/>
        <input class="editable-sub" value="${esc(c.sub)}" onchange="comms[${i}].sub=this.value;saveAll()"/>
      </div>
      <select class="tag ${coT[c.status]||'tag-ops'}" onchange="comms[${i}].status=this.value;saveAll();renderComm()" style="border:none;outline:none;cursor:pointer;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;font-family:inherit">
        ${coS.map(s=>`<option value="${s}"${c.status===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <button class="del-btn" onclick="comms.splice(${i},1);saveAll();renderComm()">✕</button>
    </div>`).join('');
}
function addComm(){
  const inp=document.getElementById('commInput'),v=inp.value.trim();if(!v)return;
  comms.push({name:v,sub:'',status:'Lên kế hoạch'});saveAll();inp.value='';renderComm();
}
document.getElementById('commInput').onkeydown=e=>{if(e.key==='Enter')addComm();};

/* MODAL */
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.getElementById('clientModal').onclick=e=>{if(e.target===e.currentTarget)closeModal('clientModal');};
document.getElementById('linkModal').onclick=e=>{if(e.target===e.currentTarget)closeModal('linkModal');};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('clientModal');closeModal('linkModal');}});

renderTasks();renderClients();renderKPI();renderKPIPills();renderChannels();renderCampaigns();renderComm();
</script>
</body>
</html>
